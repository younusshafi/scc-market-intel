databases:
  - name: scc-intel-db
    plan: basic
    databaseName: scc_intel
    user: scc_admin

services:
  # Backend API
  - type: web
    name: scc-intel-api
    runtime: python
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scc-intel-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENVIRONMENT
        value: production

  # Frontend static site
  - type: web
    name: scc-intel-dashboard
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: scc-intel-api
          type: web
          property: host

  # Daily tender scraper
  - type: cron
    name: scc-scrape-tenders
    runtime: python
    schedule: "0 6 * * *"  # 6 AM UTC daily (10 AM Oman)
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python -m app.jobs.scrape_tenders
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scc-intel-db
          property: connectionString

  # Daily news scraper
  - type: cron
    name: scc-scrape-news
    runtime: python
    schedule: "0 7 * * *"  # 7 AM UTC daily (11 AM Oman)
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python -m app.jobs.scrape_news
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scc-intel-db
          property: connectionString

  # Weekly briefing generation (Sunday 5 AM UTC = Sunday 9 AM Oman)
  - type: cron
    name: scc-weekly-briefing
    runtime: python
    schedule: "0 5 * * 0"
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python -m app.jobs.generate_briefing
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scc-intel-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
